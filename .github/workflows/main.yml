name: React Native Android Multi-Arch Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86, x86_64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 19.x

      - name: Install dependencies
        run: npm install

      # 恢复 Gradle 缓存
      - name: Restore Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.arch }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('android/build.gradle') }}-${{ hashFiles('android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.arch }}-
            ${{ runner.os }}-gradle-

      # 如果您选择在 CI 中生成原生目录，保留此步骤
      # 如果您已将 android 和 ios 目录提交到仓库，请删除下面这一步
      - name: Run Expo Prebuild
        run: npx expo prebuild

      # 修改 build.gradle 以仅构建特定架构
      - name: Configure build for specific architecture
        run: |
          echo "配置构建为仅支持 ${{ matrix.arch }} 架构"
          sed -i '/ndk {/,/}/c\            ndk {\n                abiFilters "${{ matrix.arch }}"\n            }' android/app/build.gradle

      # 构建 Android 特定架构的 APK
      - name: Build Android Release for ${{ matrix.arch }}
        run: cd android && ./gradlew assembleRelease

      # 上传特定架构的 APK
      - name: Upload Android Release APK for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ matrix.arch }}
          path: android/app/build/outputs/apk/release/app-release.apk
          
  build-universal:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 19.x

      - name: Install dependencies
        run: npm install

      # 恢复 Gradle 缓存
      - name: Restore Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-universal-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('android/build.gradle') }}-${{ hashFiles('android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-universal-
            ${{ runner.os }}-gradle-

      # 如果您选择在 CI 中生成原生目录，保留此步骤
      - name: Run Expo Prebuild
        run: npx expo prebuild

      # 构建通用 APK (包含所有架构)
      - name: Build Universal Android Release
        run: cd android && ./gradlew assembleRelease

      # 上传通用 APK
      - name: Upload Universal Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-universal
          path: android/app/build/outputs/apk/release/app-release.apk

      # 生成包含所有架构的 AAB (Android App Bundle)
      - name: Build Android App Bundle
        run: cd android && ./gradlew bundleRelease

      # 上传 AAB 文件
      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab

name: React Native Android Multi-Arch Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 19.x

      - name: Install dependencies
        run: npm install

      # 恢复 Gradle 缓存
      - name: Restore Gradle Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('android/build.gradle') }}-${{ hashFiles('android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 如果您选择在 CI 中生成原生目录，保留此步骤
      # 如果您已将 android 和 ios 目录提交到仓库，请删除下面这一步
      - name: Run Expo Prebuild
        run: npx expo prebuild

      # 修改 build.gradle 以启用 per-ABI 构建
      - name: Configure build.gradle for split APKs
        run: |
          echo "配置 build.gradle 来实现按架构分包"
          # 向 android/app/build.gradle 添加 splits 配置
          BUILD_GRADLE="android/app/build.gradle"
          
          # 检查文件是否存在
          if [ ! -f "$BUILD_GRADLE" ]; then
            echo "错误: $BUILD_GRADLE 不存在!"
            exit 1
          fi
          
          # 备份原始文件
          cp $BUILD_GRADLE ${BUILD_GRADLE}.bak
          
          # 查找 android { 块结束位置
          ANDROID_BLOCK_END=$(grep -n "}" $BUILD_GRADLE | grep -A1 "android {" | tail -n1 | cut -d: -f1)
          
          if [ -z "$ANDROID_BLOCK_END" ]; then
            echo "无法找到 android { 块结束位置"
            exit 1
          fi
          
          # 在 android 块内添加 splits 配置
          SPLITS_CONFIG='
    // 配置按架构分包
    splits {
        abi {
            enable true
            reset()
            include "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
            universalApk true
        }
    }'
          
          sed -i "${ANDROID_BLOCK_END}i\\${SPLITS_CONFIG}" $BUILD_GRADLE
          
          echo "修改后的 build.gradle:"
          cat $BUILD_GRADLE

      # 构建 Android Release
      - name: Build Android Release
        run: cd android && ./gradlew assembleRelease

      # 列出构建产物
      - name: List Build Outputs
        run: find android/app/build/outputs -type f -name "*.apk" | sort

      # 上传分架构 APK 文件
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: android-arm64-v8a
          path: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          
      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: android-armeabi-v7a
          path: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          
      - name: Upload x86 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-x86
          path: android/app/build/outputs/apk/release/app-x86-release.apk
          
      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-x86_64
          path: android/app/build/outputs/apk/release/app-x86_64-release.apk
      
      # 上传通用 APK
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: android-universal
          path: android/app/build/outputs/apk/release/app-universal-release.apk
          
      # 构建和上传 AAB 文件 (Google Play 格式)
      - name: Build Android App Bundle
        run: cd android && ./gradlew bundleRelease
        
      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: android-app-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
